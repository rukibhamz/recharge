# Render.com — Web Service
# Build: npm install
# Start: npm start
# Health: /health

services:
  - type: web
    name: recharge-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: LLM_PROVIDER_ORDER
        value: gemini
